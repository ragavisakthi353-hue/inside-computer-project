<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inside a Computer</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

</head>

<body>

<!-- PARTICLE BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<!-- PROGRESS BAR -->
<div id="progressBar"></div>

<!-- HERO -->
<section class="section hero">
  <h1>Inside a Computer</h1>
  <p>Scroll to explore</p>
</section>

<!-- INTRO -->
<section class="section">
  <h2>Introduction</h2>
  <p>A computer processes data using CPU, RAM, and GPU.</p>
</section>

<!-- COMPONENTS -->
<section class="section">
  <h2>Core Components</h2>

  <div class="cards">
    <div class="card" onclick="showInfo('cpu')">CPU</div>
    <div class="card" onclick="showInfo('ram')">RAM</div>
    <div class="card" onclick="showInfo('gpu')">GPU</div>
  </div>

  <div id="infoBox">Click a component</div>
</section>

<!-- CPU -->
<section class="section">
  <h2>CPU Simulation</h2>

  <div class="cpu">
    <div class="core" onclick="activateCore(this)"></div>
    <div class="core" onclick="activateCore(this)"></div>
    <div class="core" onclick="activateCore(this)"></div>
    <div class="core" onclick="activateCore(this)"></div>
  </div>
</section>

<!-- PROGRAM -->
<section class="section">
  <h2>Run Program</h2>

  <button onclick="runProgram()">Run Program</button>

  <div class="flow">
    <div id="input">Input</div>
    <div id="cpuStep">CPU</div>
    <div id="ramStep">RAM</div>
    <div id="gpuStep">GPU</div>
    <div id="output">Output</div>
  </div>

  <p id="typingText"></p>
</section>

<!-- POWER -->
<section class="section">
  <h2>Power Control</h2>
  <button onclick="togglePower()">Toggle Power</button>
  <h3 id="powerStatus">OFF</h3>
</section>

<script src="script.js"></script>

</body>
</html>
